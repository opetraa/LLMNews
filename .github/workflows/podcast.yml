name: Generate Weekly Tech Podcast

on:
  schedule:
    # Runs every Saturday at 08:00 UTC (17:00 KST)
    - cron: '0 8 * * 6'
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # To save the mp3 and commit to gh-pages branch
      id-token: write  # Required for Google WIF OIDC Auth

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          # Install ffmpeg for pydub to merge chunked mp3
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Checkout gh-pages history
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: public
        continue-on-error: true

      - name: Run Pipeline (Generate Script, MP3, RSS)
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          GCP_LOCATION: ${{ secrets.GCP_LOCATION }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GITHUB_PAGES_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          PYTHONPATH: .
        run: |
          mkdir -p public
          python run_pipeline.py

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: false
